.cut-panel{display:none;margin-top:8px;background:#fff;border:1.5px solid #C8E6FA;border-radius:10px;overflow:hidden}
.cut-panel.open{display:block}
.cut-grid{display:grid;grid-template-columns:1fr 1fr}
.copt{display:flex;align-items:flex-start;gap:8px;padding:10px;border-bottom:1px solid #E8F4FD;border-right:1px solid #E8F4FD;cursor:pointer}

.copt span{font-size:14px;color:#0D2A4A;font-weight:600}
.copt span small{display:block;font-size:11px;color:#A8C8E8;font-weight:400}

.line{background:#fff;border:1.5px solid #C8E6FA;border-radius:12px;padding:14px;margin-bottom:12px;box-shadow:0 2px 6px rgba(13,42,74,.05)}
.line-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.line-num{font-size:13px;font-weight:700;color:#5BA3D9;text-transform:uppercase;letter-spacing:.08em}

.btn-main{width:100%;padding:15px;border:none;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;font-family:'Outfit',sans-serif;margin-bottom:10px}
.btn-save{background:#0D2A4A;color:#fff}
.btn-mail{background:#5BA3D9;color:#fff}
.btn-pdf{background:#EBF5FF;color:#0D2A4A;border:1.5px solid #A8D4F5}
.ocard{background:#fff;border:1.5px solid #C8E6FA;border-radius:12px;margin-bottom:10px;overflow:hidden;box-shadow:0 2px 6px rgba(13,42,74,.05)}
.ocard-hd{padding:12px 14px;display:flex;justify-content:space-between;align-items:center;cursor:pointer}
.oclient{font-weight:700;font-size:16px;color:#0D2A4A}
.odate{font-size:12px;color:#5BA3D9;margin-top:2px}
.otot{background:#EBF5FF;color:#0D2A4A;font-weight:700;font-size:15px;padding:4px 12px;border-radius:16px;border:1px solid #A8D4F5}
.status-badge{display:inline-block;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:700;text-transform:uppercase;margin-top:3px}
.status-attente{background:#FFF3CD;color:#856404}
.status-prep{background:#D4EDFF;color:#0D5C96}
.obody{padding:12px 14px;display:none;border-top:1.5px solid #E8F4FD}

.oprod{padding:7px 0;border-bottom:1px solid #E8F4FD;font-size:14px}

.tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:4px}
.tag{font-size:11px;padding:2px 8px;border-radius:8px;font-weight:600}
.tcut{background:#E8F4FD;color:#0D2A4A}

.a-copy{background:#EBF5FF;color:#0D2A4A}
.a-mail{background:#D4EDFF;color:#1A6FA0}
.a-pdf{background:#FFF3CD;color:#856404}
.a-del{background:#FFF0F0;color:#E05252}
.srch{margin-bottom:12px}
.tgroup{margin-bottom:14px}
.tgroup-title{font-size:13px;font-weight:700;color:#5BA3D9;text-transform:uppercase;letter-spacing:.08em;padding:8px 10px;border-bottom:2px solid #C8E6FA;margin-bottom:6px;background:#F0F6FF;border-radius:6px 6px 0 0}
.titem{display:flex;justify-content:space-between;align-items:center;padding:10px;border-radius:6px;font-size:14px}
.titem:nth-child(odd){background:#F7FBFF}
.tname{flex:1;color:#0D2A4A;font-weight:500}
.tunit{color:#A8C8E8;font-size:12px;margin-right:6px}
.tprice{font-weight:700;color:#0D2A4A}
.tnc{color:#A8C8E8;font-style:italic;font-size:12px}
.tadd{background:#0D2A4A;color:#C9A84C;border:none;border-radius:7px;width:32px;height:32px;font-size:22px;font-weight:700;cursor:pointer;flex-shrink:0;margin-left:8px;font-family:sans-serif;line-height:1}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:#0D2A4A;color:#fff;padding:10px 22px;border-radius:24px;font-size:14px;font-weight:600;box-shadow:0 4px 20px rgba(13,42,74,.3);transition:transform .3s;z-index:999;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.err{background:#E05252}
.empty{text-align:center;padding:40px 20px;color:#A8C8E8;font-size:15px}
.prod-hint{background:#EBF5FF;border:1.5px solid #A8D4F5;border-radius:8px;padding:8px 12px;margin-top:6px;display:none;font-size:13px;cursor:pointer}

.prod-hint-row{display:flex;justify-content:space-between;align-items:center;color:#0D2A4A;font-weight:600}
.prod-hint-apply{color:#5BA3D9;font-size:12px;margin-top:4px;text-align:right}
  </style>
</head>
<body>

<header>
  <div class="logo-wrap">
    <img src="https://vins94240.github.io/paris-caviar/logo.jpg" class="logo-img" alt="PC"/>
    <div class="logo-text">
      <span>Paris Caviar</span>
      <span>Marche de Rungis</span>
    </div>
  </div>
  <div id="badge">0 commande</div>
</header>

<div class="tabs">
  <button class="tab active" onclick="goTab('new',this)">+ Nouvelle</button>
  <button class="tab" onclick="goTab('list',this)">Commandes</button>
  <button class="tab" onclick="goTab('tarif',this)">Tarifs</button>
</div>

<!-- PAGE NOUVELLE COMMANDE -->
<div class="page active" id="page-new">

  <div id="promosBanner" style="display:none;background:#EBF5FF;border:1.5px solid #A8D4F5;border-radius:14px;padding:14px;margin-bottom:14px;overflow:hidden">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
      <div style="font-size:13px;font-weight:700;color:#0D2A4A;text-transform:uppercase;letter-spacing:.06em">🔥 Promos du jour</div>
      <button onclick="showPromoPopup()" style="background:#0D2A4A;border:none;color:#A8D4F5;border-radius:8px;font-size:12px;font-weight:700;padding:5px 12px;cursor:pointer;font-family:Outfit,sans-serif">Voir tout</button>
    </div>
    <div style="position:relative">
      <div id="promosBannerList" style="display:flex;gap:10px;overflow-x:auto;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding-bottom:4px"></div>
    </div>
    <div id="promosDots" style="display:flex;justify-content:center;gap:5px;margin-top:10px"></div>
  </div>

  <div class="card">
    <div class="card-title">Informations</div>
    <label>Nom du client</label>
    <div id="CAC">
      <input type="text" id="clientName" placeholder="Taper pour rechercher ou nouveau client..." oninput="onClientInput()" autocomplete="off" autocorrect="off" autocapitalize="words"/>
      <div class="cac-drop" id="CAC_DROP"></div>
    </div>
    <label style="margin-top:12px">Date de livraison</label>
    <input type="date" id="delivDate"/>
  </div>

  <div class="hist" id="histBanner">
    <div class="hist-hd">
      <span id="hist-title">Derniere commande</span>
    </div>
    <div id="histItems"></div>
    <button class="hist-all" onclick="applyAllHistory()">Reprendre la commande</button>
  </div>

  <div class="card">
    <div class="card-title">Produits</div>
    <div id="lines"></div>
    <button class="btn-add" onclick="addLine()">+ Ajouter un produit</button>
  </div>

  <button class="btn-main btn-save" onclick="saveOrder()">Valider et enregistrer</button>
  <button class="btn-main btn-mail" onclick="mailOrder()">Envoyer a commandes@paris-caviar.fr</button>
  <button class="btn-main btn-pdf" onclick="pdfOrder()">Generer un PDF</button>
</div>

<!-- PAGE COMMANDES -->
<div class="page" id="page-list">
  <div style="display:flex;gap:8px;margin-bottom:12px">
    <input type="text" id="searchOrd" placeholder="Rechercher un client..." oninput="showOrders(this.value)" style="flex:1"/>
    <button onclick="clearAll()" style="background:#FFF0F0;border:1px solid #FFCDD2;color:#E05252;border-radius:8px;padding:10px 14px;font-size:13px;font-weight:600;cursor:pointer;font-family:Outfit,sans-serif;white-space:nowrap">Tout effacer</button>
  </div>
  <div id="orderList"></div>
</div>

<!-- PAGE TARIFS -->
<div class="page" id="page-tarif">
  <div class="srch">
    <input type="text" placeholder="Rechercher un produit..." oninput="showTarif(this.value)"/>
  </div>
  <div id="tarifList"></div>
</div>

<div class="toast" id="toast"></div>

<!-- POPUP PROMOS v1773676066 -->
<div id="promoOverlay" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(13,42,74,.85);z-index:200;align-items:center;justify-content:center;padding:20px">
  <div style="background:#fff;border-radius:16px;width:100%;max-width:420px;overflow:hidden;box-shadow:0 8px 32px rgba(13,42,74,.3)">
    <div style="background:#0D2A4A;padding:16px 20px;display:flex;justify-content:space-between;align-items:center">
      <div>
        <div style="color:#A8D4F5;font-size:17px;font-weight:700">Promos du jour</div>
        <div style="color:#A8C8E8;font-size:12px;margin-top:2px" id="promoDate"></div>
      </div>
      <button onclick="closePromo()" style="background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);color:white;width:32px;height:32px;border-radius:50%;font-size:18px;cursor:pointer;font-family:sans-serif;line-height:1">x</button>
    </div>
    <div id="promoList" style="max-height:340px;overflow-y:auto"></div>
    <div style="padding:12px 14px;border-top:1.5px solid #E8F4FD;display:flex;gap:8px">
      <button onclick="closePromo()" style="flex:1;padding:11px;background:#F0F6FF;border:1.5px solid #C8E6FA;border-radius:8px;color:#5BA3D9;font-size:14px;font-weight:700;cursor:pointer;font-family:Outfit,sans-serif">Continuer</button>
      <button onclick="openAdmin()" style="padding:11px 16px;background:#EBF5FF;border:1.5px solid #A8D4F5;border-radius:8px;color:#5BA3D9;font-size:14px;font-weight:700;cursor:pointer;font-family:Outfit,sans-serif">Admin</button>
    </div>
  </div>
</div>

<!-- POPUP ADMIN -->
<div id="adminOverlay" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(13,42,74,.9);z-index:300;align-items:center;justify-content:center;padding:20px">
  <div style="background:#fff;border-radius:16px;width:100%;max-width:440px;overflow:hidden">
    <div style="background:#0D2A4A;padding:16px 20px;color:#A8D4F5;font-size:16px;font-weight:700">Gestion des promos</div>
    <div style="padding:16px">
      <div id="adminPinBox">
        <label>Code admin</label>
        <input type="password" id="adminPin" placeholder="Code secret..." style="margin-bottom:10px"/>
        <button onclick="checkPin()" style="width:100%;padding:12px;background:#0D2A4A;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;font-family:Outfit,sans-serif;margin-bottom:8px">Valider</button>
        <button onclick="closeAdmin()" style="width:100%;padding:12px;background:#F0F6FF;color:#5BA3D9;border:1.5px solid #C8E6FA;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;font-family:Outfit,sans-serif">Annuler</button>
      </div>
      <div id="adminEditBox" style="display:none">
        <div style="font-size:13px;color:#5BA3D9;font-weight:700;margin-bottom:8px;text-transform:uppercase;letter-spacing:.06em">Coller le message WhatsApp</div>
        <textarea id="adminPaste" placeholder="Coller le texte WhatsApp ici..." style="width:100%;height:100px;font-size:14px;padding:10px;background:#F7FBFF;border:1.5px solid #C8E6FA;border-radius:8px;color:#0D2A4A;font-family:sans-serif;margin-bottom:8px;resize:vertical"></textarea>
        <button onclick="parseWhatsapp()" style="width:100%;padding:11px;background:#5BA3D9;color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;font-family:Outfit,sans-serif;margin-bottom:14px">Importer le message</button>
        <div style="font-size:13px;color:#5BA3D9;font-weight:700;margin-bottom:8px;text-transform:uppercase;letter-spacing:.06em">Promos du jour</div>
        <div id="adminRows"></div>
        <button onclick="addPromoRow()" style="width:100%;padding:11px;background:#EBF5FF;border:2px dashed #A8D4F5;border-radius:8px;color:#5BA3D9;font-size:15px;font-weight:700;cursor:pointer;font-family:Outfit,sans-serif;margin-bottom:12px">+ Ajouter manuellement</button>
        <button onclick="savePromos()" style="width:100%;padding:12px;background:#0D2A4A;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;font-family:Outfit,sans-serif;margin-bottom:8px">Enregistrer</button>
        <button onclick="closeAdmin()" style="width:100%;padding:12px;background:#F0F6FF;color:#5BA3D9;border:1.5px solid #C8E6FA;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;font-family:Outfit,sans-serif">Fermer</button>
      </div>
    </div>
  </div>
</div>

var CL = {};
for (var i = 0; i < CUTS.length; i++) CL[CUTS[i][0]] = CUTS[i][1];

var orders = (function() {
  try { return JSON.parse(localStorage.getItem('pcord3') || '[]'); } catch(e) { return []; }
})();

var lc = 0;

function save() { localStorage.setItem('pcord3', JSON.stringify(orders)); }
function fmt(n) { return (n||0).toLocaleString('fr-FR',{minimumFractionDigits:2,maximumFractionDigits:2}) + ' e'; }
function fmtD(d) { if (!d) return ''; var p = d.split('-'); return p[2]+'/'+p[1]+'/'+p[0]; }
function updateBadge() { document.getElementById('badge').textContent = orders.length + ' commande' + (orders.length > 1 ? 's' : ''); }
function toast(msg, err, info) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (err ? ' err' : '') + (info ? ' info' : '');
  setTimeout(function() { t.classList.add('show'); }, 10);
  setTimeout(function() { t.classList.remove('show'); }, 2800);
}

// ── CLIENT ──
function saveClient(n) {
  if (!n) return;
  var c = [];
  try { c = JSON.parse(localStorage.getItem('pc_clients') || '[]'); } catch(e) {}
  for (var i = 0; i < c.length; i++) if (c[i].toLowerCase() === n.toLowerCase()) return;
  c.unshift(n);
  localStorage.setItem('pc_clients', JSON.stringify(c));
}

function getKnownClients() {
  var cls = [];
  try { cls = JSON.parse(localStorage.getItem('pc_clients') || '[]'); } catch(e) {}
  var s = {}, r = [];
  for (var i = 0; i < cls.length; i++) { var k = cls[i].toLowerCase(); if (!s[k]) { s[k] = true; r.push(cls[i]); } }
  for (var i = 0; i < orders.length; i++) { var n = orders[i].client; if (n && !s[n.toLowerCase()]) { s[n.toLowerCase()] = true; r.push(n); } }
  return r;
}

function onClientInput() {
  var q = document.getElementById('clientName').value.trim().toLowerCase();
  var drop = document.getElementById('CAC_DROP');
  var clients = getKnownClients();
  var matches = [];
  for (var i = 0; i < clients.length; i++) if (!q || clients[i].toLowerCase().indexOf(q) >= 0) matches.push(clients[i]);
  drop.innerHTML = '';
  if (!matches.length) { drop.classList.remove('open'); return; }
  for (var i = 0; i < matches.length; i++) {
    (function(name) {
      var last = getLastOrder(name);
      var el = document.createElement('div');
      el.className = 'cac-item';
      el.innerHTML = '<div class="cac-name">' + name + '</div>' + (last ? '<div class="cac-sub">Derniere: ' + fmtD(last.date) + '</div>' : '');
      var done = false;
      el.addEventListener('touchend', function(e) { e.preventDefault(); if (!done) { done = true; pickClient(name); } });
      el.addEventListener('mousedown', function(e) { e.preventDefault(); if (!done) { done = true; pickClient(name); } });
      drop.appendChild(el);
    })(matches[i]);
  }
  drop.classList.add('open');
}

function pickClient(name) {
  document.getElementById('clientName').value = name;
  document.getElementById('CAC_DROP').classList.remove('open');
  showHistory(name);
}

function getLastOrder(name) {
  for (var i = 0; i < orders.length; i++) if (orders[i].client === name) return orders[i];
  return null;
}

function showHistory(name) {
  var last = getLastOrder(name);
  var banner = document.getElementById('histBanner');
  if (!last) { banner.style.display = 'none'; return; }
  banner.style.display = 'block';
  document.getElementById('hist-title').textContent = 'Derniere commande du ' + fmtD(last.date);
  var html = '';
  for (var i = 0; i < last.lines.length; i++) {
    var l = last.lines[i];
    var tags = '';
    if (l.cuts && l.cuts.length) { var cn = []; for (var j = 0; j < l.cuts.length; j++) cn.push(CL[l.cuts[j]] || l.cuts[j]); tags += '<span class="htag">' + cn.join(' + ') + '</span>'; }
    if (l.sv) tags += '<span class="htag" style="background:#D4EDFF;color:#1A6FA0">Sous vide</span>';
    html += '<div class="hit" id="HI' + i + '" onclick="applyLine(' + i + ')">'
      + '<div class="hit-name">' + l.n + '</div>'
      + '<div class="hit-d">' + l.qty + ' ' + l.u + ' x ' + fmt(l.pr) + '/' + l.u + (tags ? ' ' + tags : '') + '</div>'
      + '</div>';
  }
  document.getElementById('histItems').innerHTML = html;
}

function applyLine(idx) {
  var name = document.getElementById('clientName').value.trim();
  var last = getLastOrder(name);
  if (!last || idx >= last.lines.length) return;
  var l = last.lines[idx];
  addLine();
  var id = lc;
  document.getElementById('AI' + id).value = l.n;
  document.getElementById('ASN' + id).textContent = l.n;
  document.getElementById('ASP' + id).textContent = fmt(l.pr) + '/' + l.u;
  document.getElementById('AS' + id).style.display = 'block';
  document.getElementById('AI' + id).style.display = 'none';
  document.getElementById('PR' + id).value = l.pr;
  document.getElementById('QT' + id).value = l.qty;
  setU(id, (l.u === 'pc' || l.u === 'bt') ? 'pc' : 'kg');
  if (l.cuts && l.cuts.length) {
    document.getElementById('CT' + id).classList.add('active');
    document.getElementById('CP' + id).classList.add('open');
    for (var j = 0; j < l.cuts.length; j++) { var cb = document.getElementById('CB' + id + '_' + l.cuts[j]); if (cb) { cb.checked = true; document.getElementById('CO' + id + '_' + l.cuts[j]).classList.add('on'); } }
    updateCutLabel(id);
  }
  if (l.sv) document.getElementById('SV' + id).classList.add('active');
  if (l.cnote) document.getElementById('CN' + id).value = l.cnote;
  calcLine(id);
  var hi = document.getElementById('HI' + idx);
  if (hi) { hi.style.opacity = '0.4'; hi.style.pointerEvents = 'none'; }
  toast(l.n + ' ajoute');
}

function applyAllHistory() {
  var name = document.getElementById('clientName').value.trim();
  var last = getLastOrder(name);
  if (!last) return;
  document.getElementById('lines').innerHTML = '';
  lc = 0;
  for (var i = 0; i < last.lines.length; i++) applyLine(i);
  toast('Commande reprise');
}

// ── AUTOCOMPLETE PRODUIT ──
function setupAC(id) {
  var inp = document.getElementById('AI' + id);
  inp.addEventListener('input', function() { showAC(id); });
  inp.addEventListener('focus', function() { showAC(id); });
  document.addEventListener('touchstart', function(e) { if (!e.target.closest('#AW' + id)) closeAC(id); }, { passive: true });
  document.addEventListener('mousedown', function(e) { if (!e.target.closest('#AW' + id)) closeAC(id); });
}

function showAC(id) {
  var inp = document.getElementById('AI' + id);
  var drop = document.getElementById('AD' + id);
  var q = inp.value.toLowerCase().trim();
  drop.innerHTML = '';
  var groups = {}, order = [];
  for (var i = 0; i < CAT.length; i++) {
    var p = CAT[i];
    if (!q || p[1].toLowerCase().indexOf(q) >= 0 || p[0].toLowerCase().indexOf(q) >= 0) {
      if (!groups[p[0]]) { groups[p[0]] = []; order.push(p[0]); }
      groups[p[0]].push({ idx: i, p: p });
    }
  }
  var count = 0;
  for (var g = 0; g < order.length && count < 40; g++) {
    var grp = order[g];
    var titleEl = document.createElement('div');
    titleEl.className = 'ac-group';
    titleEl.textContent = grp;
    drop.appendChild(titleEl);
    for (var j = 0; j < groups[grp].length && count < 40; j++) {
      (function(item) {
        var el = document.createElement('div');
        el.className = 'ac-item';
        var pr = item.p[2] ? item.p[2] + 'e/' + item.p[3] : 'NC';
        el.innerHTML = '<div class="ac-item-name">' + item.p[1] + '</div><div class="ac-item-price">' + pr + '</div>';
        var done = false;
        el.addEventListener('touchend', function(e) { e.preventDefault(); if (!done) { done = true; pickProd(id, item.idx); } });
        el.addEventListener('mousedown', function(e) { e.preventDefault(); if (!done) { done = true; pickProd(id, item.idx); } });
        drop.appendChild(el);
        count++;
      })(groups[grp][j]);
    }
  }
  if (count === 0) {
    var el = document.createElement('div');
    el.className = 'ac-item';
    el.style.color = '#8A9BB0';
    el.textContent = 'Produit libre - sera saisi tel quel';
    drop.appendChild(el);
  }
  drop.classList.add('open');
}

function getLastProductData(productName) {
  var clientName = document.getElementById('clientName').value.trim();
  if (!clientName) return null;
  for (var i = 0; i < orders.length; i++) {
    var o = orders[i];
    if (o.client.toLowerCase() !== clientName.toLowerCase()) continue;
    for (var j = 0; j < o.lines.length; j++) {
      if (o.lines[j].n === productName) return o.lines[j];
    }
  }
  return null;
}

function pickProd(id, catIdx) {
  var p = CAT[catIdx];
  document.getElementById('AI' + id).value = p[1];
  document.getElementById('ASN' + id).textContent = p[1];
  document.getElementById('ASP' + id).textContent = p[2] ? fmt(p[2]) + '/' + p[3] : 'NC';
  document.getElementById('AS' + id).style.display = 'block';
  document.getElementById('AI' + id).style.display = 'none';
  closeAC(id);
  if (p[2]) document.getElementById('PR' + id).value = p[2];
  setU(id, (p[3] === 'pc' || p[3] === 'bt') ? 'pc' : 'kg');
  // Show history hint if exists
  var hist = getLastProductData(p[1]);
  var ph = document.getElementById('PH' + id);
  if (hist && ph) {
    document.getElementById('PHN' + id).textContent = hist.qty + ' ' + hist.u + ' x ' + fmt(hist.pr) + '/' + hist.u;
    document.getElementById('PHD' + id).textContent = fmtD(hist.date || '');
    ph.dataset.qty = hist.qty;
    ph.dataset.pr = hist.pr;
    ph.dataset.u = hist.u;
    ph.style.display = 'block';
  } else if (ph) {
    ph.style.display = 'none';
  }
  calcLine(id);
}

function applyProdHint(id) {
  var ph = document.getElementById('PH' + id);
  if (!ph) return;
  document.getElementById('QT' + id).value = ph.dataset.qty;
  document.getElementById('PR' + id).value = ph.dataset.pr;

function clearSel(id) {

function closeAC(id) {

function rmLine(id) { var el = document.getElementById('L' + id); if (el) el.remove(); }
function setU(id, u) { document.getElementById('UK' + id).classList.toggle('active', u === 'kg'); document.getElementById('UP' + id).classList.toggle('active', u === 'pc'); }
function getU(id) { return document.getElementById('UP' + id).classList.contains('active') ? 'pc' : 'kg'; }
function togCut(id) { document.getElementById('CT' + id).classList.toggle('active'); document.getElementById('CP' + id).classList.toggle('open'); }
function togSV(id) {
  var sv = document.getElementById('SV' + id);
  var was = sv.classList.contains('active');
  sv.classList.toggle('active');
  var pr = document.getElementById('PR' + id);
  var v = parseFloat(pr.value) || 0;
  if (v > 0) {
    if (!was) { pr.value = Math.round((v + 1) * 100) / 100; toast('+1 e/kg (sous vide)'); }
    else { pr.value = Math.round((v - 1) * 100) / 100; toast('-1 e/kg retire'); }
  }
  calcLine(id);
}
function updateCutLabel(id) {
  var sel = [];
  for (var i = 0; i < CUTS.length; i++) {
    var cb = document.getElementById('CB' + id + '_' + CUTS[i][0]);
    if (cb && cb.checked) { sel.push(CUTS[i][1]); document.getElementById('CO' + id + '_' + CUTS[i][0]).classList.add('on'); }
    else if (cb) document.getElementById('CO' + id + '_' + CUTS[i][0]).classList.remove('on');
  }
  document.getElementById('CTLBL' + id).textContent = sel.length ? sel.join(' + ') : 'Choisir les modes de coupe';
}
function getSelectedCuts(id) {
  var s = [];
  for (var i = 0; i < CUTS.length; i++) { var cb = document.getElementById('CB' + id + '_' + CUTS[i][0]); if (cb && cb.checked) s.push(CUTS[i][0]); }
  return s;
}
function calcLine(id) {
  var qty = parseFloat(document.getElementById('QT' + id).value) || 0;
  var pr = parseFloat(document.getElementById('PR' + id).value) || 0;
}

// ── COMMANDE ──
function collectLines() {
  var out = [];
  var lines = document.querySelectorAll('.line');
  for (var i = 0; i < lines.length; i++) {
    var id = lines[i].id.replace('L', '');
    var sel = document.getElementById('AS' + id);
    var nom = sel.style.display !== 'none' ? document.getElementById('ASN' + id).textContent : document.getElementById('AI' + id).value.trim();
    if (!nom) continue;
    var qty = parseFloat(document.getElementById('QT' + id).value) || 0;
    var pr = parseFloat(document.getElementById('PR' + id).value) || 0;
    if (qty <= 0 && pr <= 0) continue;
    var u = getU(id);
    var hasCut = document.getElementById('CT' + id).classList.contains('active');
    var cuts = hasCut ? getSelectedCuts(id) : [];
    var cnote = hasCut ? document.getElementById('CN' + id).value.trim() : '';
    var commEl = document.getElementById('COMM' + id);
    var comm = commEl ? commEl.value.trim() : '';
    var sv = document.getElementById('SV' + id).classList.contains('active');
    out.push({ n: nom, qty: qty, pr: pr, tot: qty * pr, u: u, cuts: cuts, cnote: cnote, sv: sv, comm: comm });
  }
  return out;
}

function buildOrder() {
  var client = document.getElementById('clientName').value.trim();
  var date = document.getElementById('delivDate').value;
  if (!client) { toast('Saisissez un nom de client', 1); return null; }
  if (!date) { toast('Choisissez une date de livraison', 1); return null; }
  var lines = collectLines();
  if (!lines.length) { toast('Ajoutez au moins un produit', 1); return null; }
  var tot = 0;
  for (var i = 0; i < lines.length; i++) tot += lines[i].tot;
  return { id: Date.now(), client: client, date: date, lines: lines, total: tot, created: new Date().toLocaleDateString('fr-FR'), status: 'attente' };
}

function saveOrder() {
  var o = buildOrder();
  if (!o) return;
  orders.unshift(o);
  save();
  saveClient(o.client);
  updateBadge();
  toast('Commande de ' + o.client + ' enregistree');
  resetForm();
}

function mailOrder() {
  var o = buildOrder();
  if (!o) return;
  orders.unshift(o);
  save();
  saveClient(o.client);
  updateBadge();
  openMail(o);
  resetForm();
}

function buildTarif() { showTarif(''); }
function showTarif(search) {
  var q = (search || '').toLowerCase();
  var groups = {}, order = [];
  for (var i = 0; i < CAT.length; i++) {
    var p = CAT[i];
    if (!q || p[1].toLowerCase().indexOf(q) >= 0 || p[0].toLowerCase().indexOf(q) >= 0) {
      if (!groups[p[0]]) { groups[p[0]] = []; order.push(p[0]); }
      groups[p[0]].push(p);
    }
  }
  var c = document.getElementById('tarifList');
  if (!order.length) { c.innerHTML = '<div class="empty">Aucun produit</div>'; return; }
  var html = '';
  for (var i = 0; i < order.length; i++) {
    var g = order[i];
    html += '<div class="tgroup"><div class="tgroup-title">' + g + '</div>';
    for (var j = 0; j < groups[g].length; j++) {
      var p = groups[g][j];
      var ci = CAT.indexOf(p);
      html += '<div class="titem">'
        + '<span class="tname">' + p[1] + '</span>'
        + '<span class="tunit">' + p[3] + '</span>'
        + (p[2] ? '<span class="tprice">' + fmt(p[2]) + '</span>' : '<span class="tnc">NC</span>')
        + '<button class="tadd" onclick="addFromTarif(' + ci + ')">+</button>'
        + '</div>';
    }
    html += '</div>';
  }
  c.innerHTML = html;
}

function addFromTarif(ci) {
  var p = CAT[ci];
  if (!p) return;
  document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
  document.querySelectorAll('.page').forEach(function(pg) { pg.classList.remove('active'); });
  document.getElementById('page-new').classList.add('active');
  document.querySelectorAll('.tab')[0].classList.add('active');
  // Use first empty line if exists, else add new
  var id = null;
  var lines = document.querySelectorAll('.line');
  for (var i = 0; i < lines.length; i++) {
    var lid = lines[i].id.replace('L', '');
    var sel = document.getElementById('AS' + lid);
    var inp = document.getElementById('AI' + lid);

      id = lid; break;

  document.getElementById('AI' + id).style.display = 'none';

function parseWhatsapp() {
  var txt = document.getElementById('adminPaste').value;
  if (!txt.trim()) { toast('Colle le texte WhatsApp dabord', 1); return; }
  var lines = txt.split('\n');
  var promos = [];
  for (var i = 0; i < lines.length; i++) {
    var line = lines[i].trim();
    if (!line) continue;
    if (line.indexOf('*') < 0 && line.indexOf('-') < 0 && line.indexOf('\u2022') < 0) continue;
    line = line.replace(/^[*\u2022]\s*/, '').trim();
    line = line.replace(/^-\s*/, '').trim();
    if (!line) continue;
    var priceMatch = line.match(/(\d+[,.]\d+|\d+)\s*\u20ac/);
    var price = 0;
    if (priceMatch) {
      price = parseFloat(priceMatch[1].replace(',', '.'));
      line = line.replace(/[\u2014\u2013-]+\s*\d+[,.]?\d*\s*\u20ac[^\n]*/g, '').trim();
      line = line.replace(/\d+[,.]?\d*\s*\u20ac[^\n]*/g, '').trim();
      line = line.replace(/[\u2014\u2013-]+\s*$/, '').trim();
    }
    if (line) promos.push({n: line, pr: price, note: ''});
  }
  if (!promos.length) { toast('Aucun produit trouve', 1); return; }
  var html = '';
  for (var j = 0; j < promos.length; j++) html += adminRow(promos[j].n, promos[j].pr);
  document.getElementById('adminRows').innerHTML = html;
  document.getElementById('adminPaste').value = '';
  toast(promos.length + ' produits importes !');
}

    .catch(function() { toast('Sauvegarde locale uniquement', 1); });

}
